<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="640" fill="#0d1117"/>
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- grid -->
  <g opacity="0.03">
    <line x1="0" y1="160" x2="1280" y2="160" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#fff" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="#fff" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="#fff" stroke-width="0.5"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- logo mark -->
  <g transform="translate(110, 220)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="#238636"/>
    <path d="M24 40L36 52L56 28" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- title -->
  <text x="230" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#e6edf3" letter-spacing="-1">Enerthya</text>
  <text x="230" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#8b949e" font-weight="400">Monorepo — Discord bot framework modular & type-safe</text>

  <!-- packages -->
  <g transform="translate(0, 380)">
    <rect x="110" y="0" width="300" height="90" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="130" y="35" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#58a6ff">@enerthya/core</text>
    <text x="130" y="60" font-family="system-ui, sans-serif" font-size="14" fill="#8b949e">Client, Builder, Registry, Context</text>

    <rect x="430" y="0" width="300" height="90" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="450" y="35" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#58a6ff">@enerthya/utils</text>
    <text x="450" y="60" font-family="system-ui, sans-serif" font-size="14" fill="#8b949e">Logger, Cooldowns, Helpers</text>

    <rect x="750" y="0" width="300" height="90" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="770" y="35" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#58a6ff">TypeScript</text>
    <text x="770" y="60" font-family="system-ui, sans-serif" font-size="14" fill="#8b949e">NodeNext, ESM, type-safe</text>
  </g>

  <!-- footer -->
  <text x="1280" y="600" font-family="system-ui, sans-serif" font-size="14" fill="#484f58" text-anchor="end">github.com/Enerthya/enerthya-packages</text>
</svg>
